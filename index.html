<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narvalo Foundation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Geist:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #888888;
            --accent: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Geist', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* Background Animation */
        .spatial-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: var(--bg);
            overflow: hidden;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.06) 0%, transparent 50%);
        }

        .spatial-particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            will-change: transform, opacity;
            box-shadow:
                0 0 20px rgba(0, 212, 255, 0.8),
                0 0 40px rgba(0, 212, 255, 0.4),
                inset 0 0 20px rgba(0, 212, 255, 0.3);
            background: radial-gradient(circle at 30% 30%, rgba(0, 212, 255, 0.6), rgba(0, 212, 255, 0.1));
            filter: brightness(1.2);
        }

        .spatial-particle.type-rotate {
            animation: rotateParticle 20s linear infinite;
        }

        .spatial-particle.type-orbit {
            animation: orbitParticle 25s linear infinite;
        }

        .spatial-particle.type-pulse {
            animation: pulseParticle 4s ease-in-out infinite;
        }

        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.25) 0%, rgba(0, 212, 255, 0.1) 30%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(100px);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.6;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.9;
            }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.3);
            animation: fadeInDown 1s ease-out;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotateZ(-2deg);
        }

        .hero-content h1 {
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            line-height: 0.7;
            animation: fadeInUp 1s ease-out 0.2s both;

        }

        .hero-content .subtitle {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            color: var(--text-muted);
            max-width: 600px;
            margin: 1.5rem auto 3rem;
            font-weight: 300;
            line-height: 1.6;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        footer {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            z-index: 2;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        footer a:hover {
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) translateX(0px) scale(1);
                opacity: 0.4;
            }

            25% {
                transform: translateY(-40px) translateX(25px) scale(1.1);
                opacity: 0.6;
            }

            50% {
                transform: translateY(-20px) translateX(-30px) scale(0.9);
                opacity: 0.3;
            }

            75% {
                transform: translateY(-35px) translateX(20px) scale(1.05);
                opacity: 0.5;
            }
        }

        @keyframes rotateParticle {
            0% {
                transform: rotate(0deg) translateY(0);
            }

            100% {
                transform: rotate(360deg) translateY(-20px);
            }
        }

        @keyframes orbitParticle {
            0% {
                transform: rotate(0deg) translateX(150px) rotate(-0deg);
            }

            100% {
                transform: rotate(360deg) translateX(150px) rotate(-360deg);
            }
        }

        @keyframes pulseParticle {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.4;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: 0.3;
                filter: brightness(1) blur(0px);
            }

            50% {
                opacity: 0.7;
                filter: brightness(1.4) blur(2px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-content h1 {
                margin-bottom: 1rem;
            }

            .hero-content .subtitle {
                margin: 0 auto 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="spatial-bg" id="spatialBg"></div>
    <section id="hero" class="hero">
        <div class="hero-content">
            <img src="logo.jpg" alt="Narvalo Foundation" class="logo">
            <h1>Narvalo Foundation <span style="color: aqua; font-size: 160px;">.</span></h1>
            <p class="subtitle">
                A product company that builds amazing products.
            </p>
        </div>
        <footer>
            <p>&copy; 2026 <a href="https://github.com/narvalofoundation" target="_blank" rel="noopener">Narvalo
                    Foundation</a>. All rights reserved.</p>
        </footer>
    </section>

    <script>
        // Generate spatial particles with varied animations
        const spatialBg = document.getElementById('spatialBg');
        const particleCount = 50;
        const animationTypes = ['float', 'type-rotate', 'type-orbit', 'type-pulse'];

        const particles = [];

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            const animType = animationTypes[Math.floor(Math.random() * animationTypes.length)];
            particle.className = `spatial-particle ${animType}`;

            const size = Math.random() * 200 + 30;
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            const depth = Math.random() * 0.5 + 0.5; // 0.5 to 1

            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';
            particle.style.opacity = depth * 0.6;

            const duration = Math.random() * 20 + 15;
            const delay = Math.random() * 3;

            if (animType === 'float') {
                particle.style.animation = `float ${duration}s ease-in-out ${delay}s infinite, shimmer ${Math.random() * 2 + 3}s ease-in-out ${delay}s infinite`;
            } else {
                particle.style.animation = `${animType.replace('type-', '')}Particle ${duration}s linear ${delay}s infinite`;
            }

            particles.push({
                element: particle,
                x: startX,
                y: startY,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                depth: depth,
                baseX: startX,
                baseY: startY
            });

            spatialBg.appendChild(particle);
        }

        // Enhanced mouse parallax effect
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Parallax animation loop
        function updateParallax() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const diffX = (mouseX - centerX) / centerX;
            const diffY = (mouseY - centerY) / centerY;

            particles.forEach((p, index) => {
                const offset = (p.depth * (index % 4 + 1)) * 25;
                const currentX = p.baseX + diffX * offset;
                const currentY = p.baseY + diffY * offset;

                // Add subtle floating motion to parallax
                const time = Date.now() * 0.0005;
                const floatX = Math.sin(time + index) * 5;
                const floatY = Math.cos(time + index * 0.7) * 5;

                p.element.style.transform = `translate(${currentX - p.baseX + floatX}px, ${currentY - p.baseY + floatY}px)`;
            });

            requestAnimationFrame(updateParallax);
        }

        updateParallax();

        // Handle window resize
        window.addEventListener('resize', () => {
            particles.forEach(p => {
                const newX = Math.random() * window.innerWidth;
                const newY = Math.random() * window.innerHeight;
                p.baseX = newX;
                p.baseY = newY;
                p.x = newX;
                p.y = newY;
            });
        });
    </script>
</body>

</html>
