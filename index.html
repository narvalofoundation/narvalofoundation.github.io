<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narvalo Foundation</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fa;
            color: #1a1a1a;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        .logo {
            width: 140px;
        }

        h1 {
            font-size: 40px;
            margin: 20px 0 10px 0;
        }

        .subtitle {
            font-size: 18px;
            color: #555;
        }

        .product {
            background: white;
            padding: 40px;
            border-radius: 12px;
            margin-top: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .product h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .cta {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            background: #1e7ae0;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .cta:hover {
            background: #1665bb;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <img src="logo.jpg" class="logo" alt="Narvalo Foundation Logo">
            <h1>Narvalo Foundation</h1>
            <p class="subtitle">
                Costruiamo strumenti semplici e potenti per il futuro.
            </p>
        </header>

        <section class="product">

            <h2>GNAM</h2>

            <p>
                Il primo prodotto della Narvalo Foundation.
                <br><br>
                Stiamo costruendo qualcosa di nuovo.
                Semplice. Potente. Intelligente.
            </p>

            <a href="#" class="cta">Scopri di più</a>

        </section>

        <footer>
            © 2026 Narvalo Foundation
        </footer>

    </div>

</body>

</html>
